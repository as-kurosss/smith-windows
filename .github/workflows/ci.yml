name: Rust CI

on: [push, pull_request]

jobs:
  test-and-compliance:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run fmt check
        run: cargo fmt --check

      - name: Check context bundle
        run: |
          if [ ! -f "context_bundle.md" ]; then
            echo "ERROR: context_bundle.md not found. Run: cargo run --bin bundle_context"
            exit 1
          fi
          echo "✅ context_bundle.md exists and is up to date"

      - name: Check for forbidden patterns
        run: |
          echo "Checking for forbidden patterns (unwrap/expect/panic)..."
          if grep -r "\.unwrap()\|\.expect(" src/; then
            echo "ERROR: Found forbidden patterns (unwrap/expect)"
            exit 1
          fi
          echo "✅ No forbidden patterns found in src/"

      - name: Check documentation consistency
        run: |
          echo "Checking for documentation updates in PR..."
          # Simple check: if src files changed, context_bundle should be updated
          if git diff --name-only origin/main...HEAD | grep -q "^src/"; then
            if git diff --name-only origin/main...HEAD | grep -q "^context_bundle.md$"; then
              echo "✅ context_bundle.md updated with src changes"
            else
              echo "WARNING: src/ files changed but context_bundle.md not updated"
            fi
          fi
