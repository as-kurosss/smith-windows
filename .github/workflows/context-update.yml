name: Update Context Bundle

on:
  push:
    paths:
      - 'docs/**'
      - 'src/**'
      - 'AGENTS.md'
      - 'ARCHITECTURE.md'
      - '.qwen/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-context:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update context_bundle.md
        run: cargo run --bin bundle_context

      - name: Check for changes
        id: git-check
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add context_bundle.md
          git diff-index --quiet HEAD || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git add context_bundle.md
          git commit -m "chore: update context bundle"
          git push
